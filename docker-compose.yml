services:
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: mam-admin
      MINIO_ROOT_PASSWORD: mampasswordforlocal
      TZ: Asia/Bangkok
      MINIO_SERVER_URL: http://localhost:9000
    volumes:
      - ./data:/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mam-portfolio
      
  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 mam-admin mampasswordforlocal;
      mc mb local/portfolio;
      mc anonymous set download local/portfolio;
      exit 0;
      "
    networks:
      - mam-portfolio
  backend:
    build: .
    container_name: mamportfolio-api
    ports:
      - "4000:4000"
    restart: unless-stopped
    environment:
      PORT: 4000
      MONGO_URI: mongodb://host.docker.internal:27017/mamportfolio
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: mam-admin
      MINIO_SECRET_KEY: mampasswordforlocal
      MINIO_BUCKET: portfolio
    depends_on:
      - minio
    networks:
      - mam-portfolio
networks:
  mam-portfolio:
    external: true